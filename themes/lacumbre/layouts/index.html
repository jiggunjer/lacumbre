{{ define "main" }}

<section class="hero" style="background-image: url('{{ .Site.Params.heroImage }}');">
  <div class="hero-content">
    <h1>{{ .Site.Params.heroHeading }}</h1>
    <p>{{ .Site.Params.heroText }}</p>
    <div class="hero-buttons">
      <a href="#contact" class="btn btn-primary">{{ .Site.Params.ctaBook }}</a>
      <a href="#villa" class="btn btn-outline">{{ .Site.Params.ctaExplore }}</a>
    </div>
  </div>
</section>

<main>
  {{ .Content }}
</main>

{{ end }}
